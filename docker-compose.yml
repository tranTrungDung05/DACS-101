version: '3.8'

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dacs-sql-server
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourPassword123!
      - MSSQL_PID=Developer
    ports:
      - "1435:1433"
    volumes:
      - sql-data:/var/opt/mssql

volumes:
  sql-data:
